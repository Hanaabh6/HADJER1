version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellibuild-backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_PHONE_KEY=${SUPABASE_PHONE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./main.py:/app/main.py
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - intellibuild-network

  # Optional: nginx reverse proxy (for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: intellibuild-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - intellibuild-network
    restart: unless-stopped
    profiles:
      - prod

networks:
  intellibuild-network:
    driver: bridge
